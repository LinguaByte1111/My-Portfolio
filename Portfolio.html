<title>Shrutayu Wankhade — AI/ML Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ==================== CSS VARIABLES ==================== */
:root {
  --bg: #05060a;
  --bg2: #0b0d14;
  --bg3: #111420;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text: #e8eaf0;
  --text2: #8a8fa8;
  --text3: #555b72;
  --accent: #00f5c4;
  --accent2: #7b6fff;
  --accent3: #ff6b6b;
  --glow: rgba(0,245,196,0.15);
  --glow2: rgba(123,111,255,0.15);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

[data-theme="light"] {
  --bg: #f0f2f8;
  --bg2: #e8ebf5;
  --bg3: #dde1f0;
  --surface: rgba(0,0,0,0.04);
  --surface2: rgba(0,0,0,0.07);
  --border: rgba(0,0,0,0.1);
  --text: #0d0f1a;
  --text2: #3a3f5c;
  --text3: #8a8fa8;
  --accent: #00c49a;
  --accent2: #5b4fff;
  --accent3: #e84040;
  --glow: rgba(0,196,154,0.12);
  --glow2: rgba(91,79,255,0.12);
}

/* ==================== RESET ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;cursor:none}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:background 0.4s ease,color 0.4s ease;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
ul{list-style:none}
