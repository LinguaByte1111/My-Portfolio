<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shrutayu Wankhade — AI/ML Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ==================== CSS VARIABLES ==================== */
:root {
  --bg: #05060a;
  --bg2: #0b0d14;
  --bg3: #111420;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text: #e8eaf0;
  --text2: #8a8fa8;
  --text3: #555b72;
  --accent: #00f5c4;
  --accent2: #7b6fff;
  --accent3: #ff6b6b;
  --glow: rgba(0,245,196,0.15);
  --glow2: rgba(123,111,255,0.15);
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

[data-theme="light"] {
  --bg: #f0f2f8;
  --bg2: #e8ebf5;
  --bg3: #dde1f0;
  --surface: rgba(0,0,0,0.04);
  --surface2: rgba(0,0,0,0.07);
  --border: rgba(0,0,0,0.1);
  --text: #0d0f1a;
  --text2: #3a3f5c;
  --text3: #8a8fa8;
  --accent: #00c49a;
  --accent2: #5b4fff;
  --accent3: #e84040;
  --glow: rgba(0,196,154,0.12);
  --glow2: rgba(91,79,255,0.12);
}

/* ==================== RESET ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;cursor:none}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  transition:background 0.4s ease,color 0.4s ease;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
ul{list-style:none}

/* ==================== CUSTOM CURSOR ==================== */
#cursor-glow{
  position:fixed;
  width:32px;height:32px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,245,196,1) 0%,rgba(0,245,196,0.7) 40%,rgba(0,245,196,0) 100%);
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  filter:blur(2px);
  box-shadow:0 0 20px rgba(0,245,196,0.8),inset 0 0 15px rgba(0,245,196,0.4);
}
#cursor-trail{
  position:fixed;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--accent);
  pointer-events:none;
  z-index:99998;
  transform:translate(-50%,-50%);
  filter:blur(1px);
  box-shadow:0 0 8px var(--accent);
}
.spark{
  position:fixed;
  width:6px;height:6px;
  border-radius:50%;
  pointer-events:none;
  z-index:99997;
  animation:sparkFade 1.2s ease-out forwards;
  box-shadow:0 0 10px currentColor;
}
@keyframes sparkFade{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  50%{opacity:0.6}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}
}

/* ==================== LOADING SCREEN ==================== */
#loader{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:99990;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:opacity 0.8s ease,visibility 0.8s ease;
}
#loader.fade-out{opacity:0;visibility:hidden}
.loader-logo{
  font-family:var(--font-display);
  font-size:clamp(2rem,6vw,5rem);
  font-weight:900;
  letter-spacing:-0.02em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeSlideUp 0.8s ease forwards;
  opacity:0;
}
.loader-sub{
  font-family:var(--font-mono);
  font-size:0.75rem;
  color:var(--text3);
  letter-spacing:0.25em;
  margin-top:0.5rem;
  animation:fadeSlideUp 0.8s 0.3s ease forwards;
  opacity:0;
  text-transform:uppercase;
}
.loader-bar-wrap{
  width:200px;
  height:2px;
  background:var(--border);
  border-radius:2px;
  margin-top:2.5rem;
  overflow:hidden;
  animation:fadeSlideUp 0.8s 0.5s ease forwards;
  opacity:0;
}
.loader-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  animation:loadProgress 2.5s 0.8s ease forwards;
}
@keyframes loadProgress{0%{width:0%}100%{width:100%}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* theme toggle now lives inside hero-left-controls */

/* ==================== NAV ==================== */
nav{
  position:fixed;top:0;left:0;right:0;
  z-index:900;
  padding:1.25rem 3rem;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(16px);
  background:rgba(5,6,10,0.7);
  border-bottom:1px solid var(--border);
  transition:background 0.3s;
}
[data-theme="light"] nav{background:rgba(240,242,248,0.8)}
.nav-logo{
  font-family:var(--font-display);
  font-weight:900;
  font-size:1.1rem;
  letter-spacing:0.05em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.nav-links{
  display:flex;gap:2rem;
  font-family:var(--font-mono);
  font-size:0.75rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
}
.nav-links a{
  color:var(--text2);
  transition:color 0.2s;
  position:relative;
}
.nav-links a::after{
  content:'';
  position:absolute;
  bottom:-3px;left:0;
  width:0;height:1px;
  background:var(--accent);
  transition:width 0.3s;
}
.nav-links a:hover{color:var(--accent)}
.nav-links a:hover::after{width:100%}

/* ==================== CYBORG AVATAR ==================== */
#cyborg-wrap{
  position:relative;
  width:72px;height:72px;
  flex-shrink:0;
}
.cyborg-circle{
  width:72px;height:72px;
  border-radius:50%;
  border:2px solid var(--accent);
  box-shadow:0 0 20px var(--glow);
  overflow:hidden;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  cursor:none;
  transition:box-shadow 0.3s;
  position:relative;
}
.cyborg-circle:hover{box-shadow:0 0 40px var(--glow)}
.cyborg-svg{
  width:60px;height:60px;
  transition:transform 0.05s ease;
}
/* Eyes follow cursor */
.eye-pupil{
  transition:cx 0.05s ease,cy 0.05s ease;
}

/* Thumbs-up overlay */
#thumbs-up{
  position:absolute;
  bottom:-1.8rem;left:50%;
  transform:translateX(-50%) scale(0.5);
  z-index:10;
  font-size:1.4rem;
  opacity:0;
  transition:all 0.3s ease;
  pointer-events:none;
}
#thumbs-up.show{
  opacity:1;
  transform:translateX(-50%) translateY(-4px) scale(1);
}

/* ==================== HERO LEFT CONTROLS ==================== */
.hero-left-controls{
  position:absolute;
  right:3rem;
  top:4.5rem;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.2rem;
}
#theme-toggle-hero{
  width:44px;height:44px;
  border-radius:50%;
  border:1px solid var(--border);
  background:var(--surface);
  backdrop-filter:blur(12px);
  cursor:none;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  transition:all 0.3s ease;
  flex-shrink:0;
}
#theme-toggle-hero:hover{
  border-color:var(--accent);
  box-shadow:0 0 20px var(--glow);
}

/* ==================== HERO ==================== */
.hero{
  min-height:100vh;
  display:flex;align-items:center;
  padding:6rem 12rem 4rem 2rem;
  position:relative;
  overflow:hidden;
}
.hero-grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
  opacity:0.5;
}
.hero-blob{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
}
.hero-blob-1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(0,245,196,0.12),transparent 70%);
  top:-10%;right:-5%;
  animation:blobFloat 8s ease-in-out infinite;
}
.hero-blob-2{
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(123,111,255,0.12),transparent 70%);
  bottom:10%;left:-5%;
  animation:blobFloat 10s 2s ease-in-out infinite reverse;
}
@keyframes blobFloat{
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-30px) scale(1.05)}
}
.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
}
.hero-eyebrow{
  font-family:var(--font-mono);
  font-size:0.75rem;
  letter-spacing:0.3em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:1.5rem;
  animation:fadeSlideUp 0.8s 1s ease both;
}
.hero-name{
  font-family:var(--font-display);
  font-size:clamp(2.5rem,6vw,6rem);
  font-weight:900;
  line-height:0.9;
  letter-spacing:-0.03em;
  margin-bottom:1.5rem;
  animation:fadeSlideUp 0.8s 1.2s ease both;
}
.hero-name span{
  display:block;
  background:linear-gradient(135deg,var(--text) 0%,var(--text2) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero-name .accent-line{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero-desc{
  font-size:1.1rem;
  color:var(--text2);
  max-width:560px;
  line-height:1.7;
  margin-bottom:3rem;
  animation:fadeSlideUp 0.8s 1.4s ease both;
}
.hero-tags{
  display:flex;flex-wrap:wrap;gap:0.75rem;
  margin-bottom:3rem;
  animation:fadeSlideUp 0.8s 1.6s ease both;
}
.hero-tag{
  font-family:var(--font-mono);
  font-size:0.7rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:0.4rem 1rem;
  border:1px solid var(--border);
  border-radius:100px;
  color:var(--text3);
  transition:all 0.3s;
}
.hero-tag:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--glow)}
.hero-cta{
  display:flex;gap:1rem;flex-wrap:wrap;
  animation:fadeSlideUp 0.8s 1.8s ease both;
}
.btn-primary{
  padding:0.9rem 2rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#05060a;
  font-family:var(--font-mono);
  font-size:0.8rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  border-radius:4px;
  cursor:none;
  transition:transform 0.2s,box-shadow 0.2s;
  border:none;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow)}
.btn-secondary{
  padding:0.9rem 2rem;
  background:transparent;
  color:var(--text);
  font-family:var(--font-mono);
  font-size:0.8rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  border-radius:4px;
  border:1px solid var(--border);
  cursor:none;
  transition:all 0.2s;
}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2)}
.hero-scroll{
  position:absolute;
  bottom:2rem;left:50%;
  transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  animation:fadeSlideUp 0.8s 2.2s ease both;
}
.hero-scroll span{
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.2em;
  color:var(--text3);
  text-transform:uppercase;
}
.scroll-line{
  width:1px;height:40px;
  background:linear-gradient(to bottom,var(--accent),transparent);
  animation:scrollBounce 2s ease-in-out infinite;
}
@keyframes scrollBounce{0%,100%{transform:scaleY(1);opacity:1}50%{transform:scaleY(0.5);opacity:0.5}}
.hero-stats{
  position:absolute;
  right:3rem;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:2rem;
  animation:fadeSlideUp 0.8s 2s ease both;
}
.hero-stat{
  text-align:right;
}
.hero-stat .num{
  font-family:var(--font-display);
  font-size:2.5rem;
  font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
}
.hero-stat .label{
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.15em;
  text-transform:uppercase;
}

/* ==================== SECTION COMMON ==================== */
section{padding:6rem 3rem}
.section-label{
  font-family:var(--font-mono);
  font-size:0.7rem;
  letter-spacing:0.3em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:1rem;
}
.section-title{
  font-family:var(--font-display);
  font-size:clamp(2rem,5vw,4rem);
  font-weight:900;
  letter-spacing:-0.02em;
  line-height:1;
  margin-bottom:1rem;
}
.section-sub{
  color:var(--text2);
  max-width:500px;
  line-height:1.7;
  margin-bottom:4rem;
}

/* ==================== PROJECTS ==================== */
#projects{background:var(--bg2)}
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:1.5rem;
}
.project-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:2rem;
  position:relative;
  overflow:hidden;
  transition:all 0.35s ease;
  cursor:none;
}
.project-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--glow),transparent 60%);
  opacity:0;
  transition:opacity 0.35s;
  pointer-events: none;
}
.project-card:hover{
  border-color:var(--accent);
  transform:translateY(-6px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 0 1px var(--accent);
}
.project-card:hover::before{opacity:1}
.project-card.featured{
  grid-column:span 2;
  background:linear-gradient(135deg,rgba(0,245,196,0.06),rgba(123,111,255,0.06));
  border-color:rgba(0,245,196,0.2);
}
.project-num{
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.2em;
  margin-bottom:1.5rem;
}
.project-icon{
  font-size:2rem;
  margin-bottom:1rem;
}
.project-title{
  font-family:var(--font-display);
  font-size:1.3rem;
  font-weight:800;
  margin-bottom:0.75rem;
  color:var(--text);
}
.project-desc{
  font-size:0.9rem;
  color:var(--text2);
  line-height:1.7;
  margin-bottom:1.5rem;
}
.project-tags{
  display:flex;flex-wrap:wrap;gap:0.5rem;
  margin-bottom:1.5rem;
}
.project-tag{
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:0.25rem 0.6rem;
  background:var(--surface2);
  border-radius:4px;
  color:var(--text3);
}
.project-links{
  display:flex;gap:1rem;
}
.project-link{
  font-family:var(--font-mono);
  font-size:0.7rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--accent);
  padding-bottom:1px;
  border-bottom:1px solid var(--accent);
  transition:opacity 0.2s;
}
.project-link:hover{
  opacity:1;
  color:var(--accent);
  text-shadow:0 0 8px var(--accent), 0 0 20px var(--accent);
  border-color:var(--accent);
}
.project-link.secondary{
  opacity:1;
  color:#aaaaaa;
  text-shadow:0 0 8px #aaaaaa, 0 0 20px #888888;
  border-color:#aaaaaa;
}
.project-highlight{
  position:absolute;
  top:1.5rem;right:1.5rem;
  font-family:var(--font-mono);
  font-size:0.6rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  padding:0.3rem 0.8rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#05060a;
  border-radius:100px;
  font-weight:700;
}

/* ==================== SKILLS SPIRAL ==================== */
#skills{position:relative;overflow:hidden}
.skills-layout{
  display:flex;
  gap:4rem;
  align-items:center;
}
.spiral-wrap{
  flex-shrink:0;
  position:relative;
  width:360px;height:360px;
}
.spiral-canvas{
  width:360px;height:360px;
}
.spiral-center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:20px;height:20px;
  border-radius:60%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  box-shadow:0 0 40px var(--glow);
  animation:spiralPulse 3s ease-in-out infinite;
}
@keyframes spiralPulse{
  0%,100%{box-shadow:0 0 40px var(--glow)}
  50%{box-shadow:0 0 70px var(--glow),0 0 120px var(--glow2)}
}
.skill-categories{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1rem;
}
.skill-cat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1.5rem;
  transition:all 0.3s;
  cursor:none;
}
.skill-cat:hover{
  border-color:var(--accent2);
  box-shadow:0 0 20px var(--glow2);
  transform:scale(1.02);
}
.skill-cat-icon{font-size:1.5rem;margin-bottom:0.75rem}
.skill-cat-title{
  font-family:var(--font-display);
  font-size:0.9rem;
  font-weight:800;
  margin-bottom:0.75rem;
  color:var(--accent2);
}
.skill-items{
  display:flex;flex-wrap:wrap;gap:0.4rem;
}
.skill-item{
  font-family:var(--font-mono);
  font-size:0.6rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:0.2rem 0.5rem;
  background:var(--surface2);
  border-radius:3px;
  color:var(--text3);
}

/* ==================== EXPERIENCE ==================== */
#experience{background:var(--bg2)}
.exp-timeline{
  position:relative;
  padding-left:2rem;
}
.exp-timeline::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:1px;
  background:linear-gradient(to bottom,var(--accent),var(--accent2),transparent);
}
.exp-item{
  position:relative;
  padding:0 0 3rem 3rem;
  opacity:0;
  transform:translateX(-20px);
  transition:all 0.6s ease;
}
.exp-item.visible{opacity:1;transform:translateX(0)}
.exp-dot{
  position:absolute;
  left:-5px;top:0;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px var(--glow);
}
.exp-date{
  font-family:var(--font-mono);
  font-size:0.7rem;
  letter-spacing:0.15em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:0.75rem;
}
.exp-role{
  font-family:var(--font-display);
  font-size:1.4rem;
  font-weight:800;
  margin-bottom:0.25rem;
}
.exp-company{
  font-family:var(--font-mono);
  font-size:0.8rem;
  color:var(--text2);
  margin-bottom:1rem;
}
.exp-bullets{
  display:flex;flex-direction:column;gap:0.5rem;
}
.exp-bullet{
  font-size:0.9rem;
  color:var(--text2);
  line-height:1.6;
  padding-left:1rem;
  position:relative;
}
.exp-bullet::before{
  content:'▹';
  position:absolute;
  left:0;
  color:var(--accent);
  font-size:0.8rem;
}

/* ==================== ABOUT / CERTIFICATIONS ==================== */
#about{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6rem;
  align-items:center;
}
.about-text .section-sub{margin-bottom:2rem}
.cert-cards{
  display:flex;flex-direction:column;gap:1rem;
}
.cert-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1.5rem;
  display:flex;align-items:center;gap:1rem;
  transition:all 0.3s;
  cursor:none;
}
.cert-card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--glow)}
.cert-icon{font-size:2rem;flex-shrink:0}
.cert-name{
  font-family:var(--font-display);
  font-size:0.95rem;
  font-weight:700;
  margin-bottom:0.25rem;
}
.cert-issuer{
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.1em;
  text-transform:uppercase;
}
.about-right{display:flex;flex-direction:column;gap:1.5rem}
.about-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:1.5rem;
  transition:all 0.3s;
}
.about-card:hover{border-color:var(--accent2);transform:translateX(6px)}
.about-card-title{
  font-family:var(--font-mono);
  font-size:0.65rem;
  letter-spacing:0.2em;
  color:var(--accent2);
  text-transform:uppercase;
  margin-bottom:0.5rem;
}
.about-card-val{
  font-family:var(--font-display);
  font-size:1.1rem;
  font-weight:700;
}

/* ==================== CONTACT ==================== */
#contact{
  text-align:center;
  position:relative;
  overflow:hidden;
}
#contact .section-label{justify-content:center;display:flex}
#contact .section-title{text-align:center}
#contact .section-sub{margin-left:auto;margin-right:auto;text-align:center}
.contact-links{
  display:flex;
  justify-content:center;
  gap:1.5rem;
  flex-wrap:wrap;
}
.contact-link{
  display:flex;align-items:center;gap:0.5rem;
  padding:1rem 2rem;
  border:1px solid var(--border);
  border-radius:8px;
  font-family:var(--font-mono);
  font-size:0.75rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text2);
  transition:all 0.3s;
  cursor:none;
}
.contact-link:hover{
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 20px var(--glow);
  transform:translateY(-3px);
}
.contact-blob{
  position:absolute;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,245,196,0.06),transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* ==================== FOOTER ==================== */
footer{
  padding:2rem 3rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:var(--text3);
  letter-spacing:0.1em;
}
